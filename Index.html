<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apprentice Supervision &amp; Obligations — Fallon Solutions Safety Toolbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#EE3224; --red-dark:#C8261A; --red-soft:#FDEBE9;
    --ink:#1B1B1D; --slate:#6E6E72; --paper:#FFFFFF; --mist:#F5F5F6;
    --line:#E4E4E7; --ok:#15803D; --okbg:#DCFCE7; --bad:#DC2626; --badbg:#FEE2E2;
    --amber:#B45309; --amberbg:#FEF3C7;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    --shadow-lg:0 12px 40px rgba(0,0,0,.12);
    --skew:-11deg;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Barlow',system-ui,sans-serif;
    color:var(--ink);
    background:var(--mist);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .app{
    max-width:880px;margin:0 auto;min-height:100vh;
    background:var(--paper);
    display:flex;flex-direction:column;
    box-shadow:var(--shadow-lg);
  }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:14px 22px;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);
    backdrop-filter:blur(8px);
  }
  .topbar img{height:30px;display:block}
  .crumb{font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--slate);white-space:nowrap}
  /* progress */
  .progress{height:4px;background:var(--line);position:relative;overflow:hidden}
  .progress > span{position:absolute;left:0;top:0;height:100%;width:0;
    background:var(--red);transition:width .5s cubic-bezier(.4,0,.2,1)}

  /* ---------- stage ---------- */
  .stage{flex:1;position:relative}
  .screen{
    display:none;padding:38px 30px 30px;
    animation:none;
  }
  .screen.active{display:block}
  .screen.active .reveal{animation:rise .55s cubic-bezier(.2,.7,.2,1) backwards}
  .reveal{opacity:0}
  .screen.active .reveal{opacity:1}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  /* stagger */
  .screen.active .reveal:nth-child(1){animation-delay:.02s}
  .reveal[data-d="1"]{animation-delay:.08s!important}
  .reveal[data-d="2"]{animation-delay:.16s!important}
  .reveal[data-d="3"]{animation-delay:.24s!important}
  .reveal[data-d="4"]{animation-delay:.32s!important}
  .reveal[data-d="5"]{animation-delay:.40s!important}
  .reveal[data-d="6"]{animation-delay:.48s!important}
  .reveal[data-d="7"]{animation-delay:.56s!important}

  /* eyebrow / kicker */
  .kicker{display:inline-flex;align-items:center;gap:9px;
    font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--red);margin-bottom:14px}
  .kicker .tag{background:var(--red);color:#fff;padding:4px 11px 3px;
    font-size:12px;line-height:1;transform:skewX(var(--skew))}
  .kicker .tag > span{display:inline-block;transform:skewX(calc(-1*var(--skew)))}

  h1.title{font-family:'Oswald';font-weight:700;font-size:clamp(28px,5.4vw,46px);
    line-height:1.02;letter-spacing:-.01em;text-transform:uppercase;margin-bottom:14px}
  h2.head{font-family:'Oswald';font-weight:700;font-size:clamp(24px,4.4vw,34px);
    line-height:1.06;letter-spacing:-.005em;text-transform:uppercase;margin-bottom:14px}
  .lede{font-size:clamp(16px,2.2vw,18.5px);color:#333;max-width:60ch;margin-bottom:8px}
  p+p{margin-top:12px}
  strong{font-weight:700}

  /* big quote / hazard banner */
  .shockline{
    margin:6px 0 22px;padding:26px 26px 24px;border-radius:14px;
    background:linear-gradient(135deg,var(--ink),#2c2c2f);color:#fff;
    position:relative;overflow:hidden}
  .shockline:before{content:"";position:absolute;inset:0;opacity:.10;
    background:repeating-linear-gradient(45deg,#000 0 14px,var(--red) 14px 28px)}
  .shockline .q{font-family:'Oswald';font-weight:700;font-size:clamp(22px,4.2vw,32px);
    line-height:1.05;text-transform:uppercase;position:relative}
  .shockline .sub{position:relative;margin-top:8px;color:#dcdcde;font-size:15.5px}

  /* cards / grid */
  .grid{display:grid;gap:16px;margin-top:18px}
  .g2{grid-template-columns:1fr 1fr}
  @media(max-width:620px){.g2{grid-template-columns:1fr}}
  .card{border:1px solid var(--line);border-radius:14px;padding:20px;background:var(--paper);
    box-shadow:var(--shadow)}
  .card h3{font-family:'Oswald';font-weight:600;font-size:18px;text-transform:uppercase;
    letter-spacing:.01em;margin-bottom:10px;display:flex;align-items:center;gap:10px}
  .card ul{list-style:none;margin-top:4px}
  .card li{position:relative;padding-left:20px;font-size:15px;margin-top:9px;color:#3a3a3c}
  .card li:before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;
    background:var(--red);transform:skewX(var(--skew))}

  /* icon chip */
  .chip{width:38px;height:38px;min-width:38px;border-radius:10px;display:grid;place-items:center;
    background:var(--red-soft);color:var(--red)}
  .chip svg{width:21px;height:21px}

  /* checklist */
  .checklist{margin-top:18px;display:flex;flex-direction:column;gap:11px}
  .check{display:flex;gap:13px;align-items:flex-start;padding:15px 17px;border:1px solid var(--line);
    border-radius:12px;background:var(--mist)}
  .check .box{width:24px;height:24px;min-width:24px;border-radius:7px;background:var(--ok);
    display:grid;place-items:center;margin-top:1px}
  .check .box svg{width:15px;height:15px;stroke:#fff;stroke-width:3.4;fill:none}
  .check .t{font-size:15.5px;color:#2a2a2c}
  .check .t b{font-weight:700}
  .check.danger .box{background:var(--red)}

  /* levels */
  .levels{display:flex;flex-direction:column;gap:14px;margin-top:18px}
  .level{border:1px solid var(--line);border-left:6px solid var(--red);border-radius:12px;
    padding:18px 20px;background:var(--paper);box-shadow:var(--shadow)}
  .level .lh{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:8px}
  .level .lh .name{font-family:'Oswald';font-weight:700;font-size:21px;text-transform:uppercase}
  .level .lh .meta{font-size:13px;color:var(--slate);font-weight:600;letter-spacing:.02em}
  .level p{font-size:15px;color:#3a3a3c}
  .level.l2{border-left-color:#E08A1E}
  .level.l3{border-left-color:#2563EB}

  /* table */
  .tablewrap{margin-top:18px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .scrollx{overflow-x:auto}
  table{border-collapse:collapse;width:100%;min-width:560px;font-size:13.5px}
  caption{caption-side:top;text-align:left;padding:13px 16px;background:var(--ink);color:#fff;
    font-family:'Oswald';font-weight:500;letter-spacing:.04em;font-size:13px;text-transform:uppercase}
  th,td{padding:9px 11px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);
    text-align:left;vertical-align:top}
  th{background:var(--red-soft);font-family:'Oswald';font-weight:600;color:var(--red-dark);
    text-transform:uppercase;font-size:12px;letter-spacing:.03em;position:sticky;top:0}
  td:first-child{font-weight:600;color:#2a2a2c;background:#fafafa}
  tr:last-child td{border-bottom:none}
  td.d{color:var(--red);font-weight:600}
  .tnote{font-size:12.5px;color:var(--slate);padding:10px 14px;background:#fafafa}

  /* note callout */
  .note{margin-top:18px;border-radius:12px;padding:15px 17px;font-size:14.5px;
    background:var(--amberbg);color:#5a3d05;border:1px solid #FBD38D}
  .note b{font-weight:700}
  .note.red{background:var(--red-soft);color:var(--red-dark);border-color:#F7C4BE}

  /* ---------- footer nav ---------- */
  .nav{display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:16px 26px;border-top:1px solid var(--line);position:sticky;bottom:0;
    background:rgba(255,255,255,.94);backdrop-filter:blur(8px)}
  .btn{font-family:'Oswald';font-weight:600;font-size:15px;letter-spacing:.04em;
    text-transform:uppercase;border:none;cursor:pointer;border-radius:10px;padding:13px 26px;
    transition:transform .12s ease, box-shadow .2s ease, background .2s ease}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--red);color:#fff;box-shadow:0 6px 16px rgba(238,50,36,.32)}
  .btn-primary:hover{background:var(--red-dark)}
  .btn-ghost{background:transparent;color:var(--slate);padding-left:6px;padding-right:6px}
  .btn-ghost:hover{color:var(--ink)}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  .dots{display:flex;gap:6px;align-items:center}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--line);transition:.3s}
  .dots i.on{background:var(--red);width:20px;border-radius:4px}

  /* ---------- welcome ---------- */
  .welcome{text-align:center;padding:46px 30px 36px}
  .welcome .logo{height:46px;margin:0 auto 26px;display:block}
  .welcome .eyebrow{font-family:'Oswald';font-weight:500;letter-spacing:.22em;font-size:13px;
    text-transform:uppercase;color:var(--red);margin-bottom:10px}
  .welcome h1{font-family:'Oswald';font-weight:700;font-size:clamp(30px,6vw,52px);line-height:1;
    text-transform:uppercase;margin-bottom:14px}
  .welcome .yr{color:var(--red)}
  .welcome .desc{max-width:48ch;margin:0 auto 26px;color:#444;font-size:16.5px}
  .meta-row{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
  .meta-row .m{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--slate);font-weight:600}
  .meta-row .m svg{width:17px;height:17px;color:var(--red)}
  .form{max-width:420px;margin:0 auto;text-align:left}
  .field{margin-bottom:15px}
  .field label{display:block;font-family:'Oswald';font-weight:500;font-size:12.5px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--slate);margin-bottom:6px}
  .field input{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:10px;
    font-family:'Barlow';font-size:16px;color:var(--ink);background:#fff;transition:border .2s}
  .field input:focus{outline:none;border-color:var(--red)}
  .field input.err{border-color:var(--bad)}
  .start-btn{width:100%;margin-top:6px;padding:15px}

  /* ---------- quiz ---------- */
  .qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .qcount{font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--slate)}
  .qbar{flex:1;height:6px;background:var(--line);border-radius:3px;margin-left:16px;overflow:hidden}
  .qbar > span{display:block;height:100%;background:var(--red);transition:width .4s}
  .qtext{font-family:'Oswald';font-weight:600;font-size:clamp(20px,3.6vw,26px);line-height:1.18;
    margin-bottom:20px}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;gap:13px;align-items:flex-start;padding:15px 17px;border:1.5px solid var(--line);
    border-radius:12px;cursor:pointer;background:#fff;transition:border .15s,background .15s;
    font-size:15.5px}
  .opt:hover{border-color:#bdbdc2}
  .opt .key{width:26px;height:26px;min-width:26px;border-radius:7px;background:var(--mist);
    display:grid;place-items:center;font-family:'Oswald';font-weight:600;font-size:14px;color:var(--slate);
    transition:.15s}
  .opt.sel{border-color:var(--red);background:var(--red-soft)}
  .opt.sel .key{background:var(--red);color:#fff}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.correct .key{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--badbg)}
  .opt.wrong .key{background:var(--bad);color:#fff}
  .opt.locked{cursor:default;pointer-events:none}
  .feedback{margin-top:16px;padding:14px 16px;border-radius:10px;font-size:14.5px;display:none}
  .feedback.show{display:block;animation:rise .35s ease}
  .feedback.ok{background:var(--okbg);color:#14532d;border:1px solid #86EFAC}
  .feedback.no{background:var(--badbg);color:#7f1d1d;border:1px solid #FCA5A5}
  .feedback b{font-weight:700}

  /* ---------- result ---------- */
  .result{text-align:center;padding:42px 30px 30px}
  .scorering{width:150px;height:150px;margin:0 auto 22px;position:relative}
  .scorering svg{transform:rotate(-90deg)}
  .scorering .pct{position:absolute;inset:0;display:grid;place-items:center;
    font-family:'Oswald';font-weight:700;font-size:38px}
  .result h2{font-family:'Oswald';font-weight:700;font-size:32px;text-transform:uppercase;margin-bottom:8px}
  .result .pass{color:var(--ok)} .result .fail{color:var(--red)}
  .result .rsub{color:#444;max-width:46ch;margin:0 auto 24px;font-size:16px}
  .review{text-align:left;margin:24px 0;display:flex;flex-direction:column;gap:10px}
  .rev{border:1px solid var(--line);border-radius:10px;padding:13px 15px;font-size:14px}
  .rev .rq{font-weight:600;margin-bottom:5px}
  .rev .ra{color:var(--ok)} .rev .ra.bad{color:var(--bad)}
  .rev .ic{font-weight:700;margin-right:6px}

  /* ---------- certificate ---------- */
  .cert{border:2px solid var(--ink);border-radius:16px;padding:34px 30px;margin:8px 0 4px;
    background:linear-gradient(180deg,#fff,#fafafa);position:relative;overflow:hidden}
  .cert:before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;
    background:var(--red-soft);transform:rotate(25deg)}
  .cert .clogo{height:34px;margin-bottom:18px;position:relative}
  .cert .ctitle{font-family:'Oswald';font-weight:700;font-size:22px;text-transform:uppercase;
    letter-spacing:.02em;position:relative;margin-bottom:4px}
  .cert .cmod{color:var(--red);font-weight:700;font-size:15px;margin-bottom:22px;position:relative}
  .cert .crow{display:flex;flex-wrap:wrap;gap:22px 40px;position:relative}
  .cert .ci{position:relative}
  .cert .ci .k{font-family:'Oswald';font-weight:500;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--slate);margin-bottom:3px}
  .cert .ci .v{font-size:18px;font-weight:600}
  .cert .stamp{position:absolute;right:26px;bottom:24px;border:3px solid var(--ok);color:var(--ok);
    font-family:'Oswald';font-weight:700;font-size:15px;letter-spacing:.08em;text-transform:uppercase;
    padding:7px 14px;border-radius:8px;transform:rotate(-7deg);opacity:.9}

  .btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}
  .hint{font-size:12.5px;color:var(--slate);margin-top:18px;max-width:50ch;margin-left:auto;margin-right:auto}

  @media print{
    .topbar,.progress,.nav,.btn-row,.hint{display:none!important}
    .app{box-shadow:none} body{background:#fff}
  }
  @media(max-width:600px){
    .screen{padding:28px 20px 24px}
    .nav{padding:14px 18px}
    .btn{padding:12px 18px;font-size:14px}
    .topbar{padding:12px 16px}
  }
  @media(max-width:420px){
    .dots{display:none}
  }
  @media(max-width:360px){
    .crumb{display:none}
    .topbar{padding:12px 14px}
    .topbar img{height:26px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <img id="brandLogo" alt="Fallon Solutions">
    <div class="crumb" id="crumb">Safety Toolbox</div>
  </div>
  <div class="progress"><span id="pbar"></span></div>

  <div class="stage" id="stage"><!-- screens injected --></div>

  <div class="nav" id="nav" style="display:none">
    <button class="btn btn-ghost" id="backBtn">&larr; Back</button>
    <div class="dots" id="dots"></div>
    <button class="btn btn-primary" id="nextBtn">Next &rarr;</button>
  </div>
</div>

function I_inline(svg){return '<span style="display:inline-flex;width:18px;height:18px;vertical-align:-3px;margin-right:8px">'+svg+'</span>';}
function chk(d,t,danger){return '<div class="check'+(danger?' danger':'')+' reveal" data-d="'+d+'"><span class="box">'+(danger?I.cross:I.check)+'</span><span class="t">'+t+'</span></div>';}
function row(name){var c='<tr><td>'+name+'</td>';for(var k=1;k<arguments.length;k++){var v=arguments[k];var cls=(v.indexOf('Direct')===0&&v.indexOf('/')===-1)?' class="d"':'';c+='<td'+cls+'>'+v+'</td>';}return c+'</tr>';}

var stage=document.getElementById('stage');
var nav=document.getElementById('nav');
var nextBtn=document.getElementById('nextBtn');
var backBtn=document.getElementById('backBtn');
var pbar=document.getElementById('pbar');
var crumb=document.getElementById('crumb');
var dotsEl=document.getElementById('dots');

/* build dots */
for(var d=0; d<SCREENS.length; d++){var s=document.createElement('i');dotsEl.appendChild(s);}
function paintDots(){var ds=dotsEl.children;for(var k=0;k<ds.length;k++){ds[k].className=(k===state.i?'on':'');}}

function renderScreen(){
  var sc=SCREENS[state.i];
  var div=document.createElement('div');
  div.className='screen';
  div.innerHTML=sc.html();
  stage.innerHTML='';
  stage.appendChild(div);
  // force reflow then activate for animation
  void div.offsetWidth;
  div.classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
  if(stage.parentElement) stage.parentElement.scrollTop=0;

  crumb.textContent = stripTags(sc.crumb);
  pbar.style.width = ((state.i)/(SCREENS.length-1)*100)+'%';
  paintDots();

  nav.style.display = sc.hideNav ? 'none' : 'flex';
  backBtn.style.visibility = state.i===0 ? 'hidden':'visible';
  var last = state.i===SCREENS.length-1;
  nextBtn.style.display = last ? 'none' : 'inline-block';
  nextBtn.textContent = 'Next \u2192';

  wireScreen(sc);
}
function stripTags(s){return s.replace(/&amp;/g,'&').replace(/<[^>]+>/g,'');}

function wireScreen(sc){
  var b=document.getElementById('startBtn');
  if(b) b.onclick=startToolbox;
  var qs=document.getElementById('quizStart');
  if(qs) qs.onclick=startQuiz;
}

function startToolbox(){
  go(1);
}
function go(i){state.i=i;renderScreen();}
nextBtn.onclick=function(){ if(state.i<SCREENS.length-1) go(state.i+1); else startQuiz(); };
backBtn.onclick=function(){ if(state.i>0) go(state.i-1); };

/* ============================================================
   QUIZ ENGINE
   ============================================================ */
var quiz={i:0,answered:false};
function startQuiz(){
  state.quizMode=true; state.answers=[]; quiz.i=0; quiz.answered=false;
  nav.style.display='none';
  renderQuestion();
}
function renderQuestion(){
  var item=QUIZ[quiz.i];
  crumb.textContent='Knowledge Check';
  pbar.style.width='100%';
  paintDots(); dotsEl.querySelectorAll('i').forEach(function(x){x.className='';});

  var keys=['A','B','C','D'];
  var opts=item.o.map(function(txt,idx){
    return '<div class="opt" data-idx="'+idx+'"><span class="key">'+keys[idx]+'</span><span>'+txt+'</span></div>';
  }).join('');

  var div=document.createElement('div');
  div.className='screen';
  div.innerHTML=''+
    '<div class="qhead reveal"><span class="qcount">Question '+(quiz.i+1)+' of '+QUIZ.length+'</span>'+
      '<span class="qbar"><span style="width:'+(quiz.i/QUIZ.length*100)+'%"></span></span></div>'+
    '<div class="qtext reveal" data-d="1">'+item.q+'</div>'+
    '<div class="opts reveal" data-d="2">'+opts+'</div>'+
    '<div class="feedback" id="fb"></div>'+
    '<div class="nav" style="position:static;border:none;padding:22px 0 0;background:none">'+
      '<span></span><button class="btn btn-primary" id="qNext" disabled>Submit answer</button></div>';
  stage.innerHTML=''; stage.appendChild(div); void div.offsetWidth; div.classList.add('active');
  window.scrollTo({top:0});

  quiz.answered=false;
  var selected=null;
  var optEls=div.querySelectorAll('.opt');
  var qNext=document.getElementById('qNext');

  optEls.forEach(function(el){
    el.onclick=function(){
      if(quiz.answered) return;
      optEls.forEach(function(o){o.classList.remove('sel');});
      el.classList.add('sel');
      selected=parseInt(el.getAttribute('data-idx'),10);
      qNext.disabled=false;
    };
  });

  qNext.onclick=function(){
    if(!quiz.answered){
      if(selected===null) return;
      quiz.answered=true;
      state.answers[quiz.i]=selected;
      var correct = selected===item.a;
      optEls.forEach(function(o){
        o.classList.add('locked');
        var idx=parseInt(o.getAttribute('data-idx'),10);
        if(idx===item.a) o.classList.add('correct');
        else if(idx===selected) o.classList.add('wrong');
      });
      if(SHOW_FEEDBACK){
        var fb=document.getElementById('fb');
        fb.className='feedback show '+(correct?'ok':'no');
        fb.innerHTML=(correct?'<b>Correct.</b> ':'<b>Not quite.</b> ')+item.why;
      }
      qNext.textContent = quiz.i===QUIZ.length-1 ? 'See results \u2192':'Next question \u2192';
    } else {
      if(quiz.i<QUIZ.length-1){ quiz.i++; renderQuestion(); }
      else renderResult();
    }
  };
}

function renderResult(){
  var correct=0;
  QUIZ.forEach(function(it,i){ if(state.answers[i]===it.a) correct++; });
  var pct=Math.round(correct/QUIZ.length*100);
  var passed=pct>=PASS_MARK;
  crumb.textContent='Result'; pbar.style.width='100%';

  var circ=2*Math.PI*64;
  var off=circ*(1-pct/100);
  var ringColor=passed?'var(--ok)':'var(--red)';

  var review=QUIZ.map(function(it,i){
    var sel=state.answers[i];
    var ok=sel===it.a;
    return '<div class="rev"><div class="rq"><span class="ic" style="color:'+(ok?'var(--ok)':'var(--bad)')+'">'+(ok?'\u2713':'\u2717')+'</span>'+it.q+'</div>'+
      (ok?'':'<div class="ra bad">Your answer: '+it.o[sel]+'</div>')+
      '<div class="ra">Correct: '+it.o[it.a]+'</div></div>';
  }).join('');

  var div=document.createElement('div');
  div.className='screen';
  div.innerHTML=''+
    '<div class="result">'+
      '<div class="scorering reveal"><svg width="150" height="150">'+
        '<circle cx="75" cy="75" r="64" stroke="var(--line)" stroke-width="12" fill="none"/>'+
        '<circle cx="75" cy="75" r="64" stroke="'+ringColor+'" stroke-width="12" fill="none" '+
        'stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+circ+'" style="transition:stroke-dashoffset 1s ease .2s" id="ring"/>'+
        '</svg><div class="pct" style="color:'+ringColor+'">'+pct+'%</div></div>'+
      '<h2 class="reveal '+(passed?'pass':'fail')+'" data-d="1">'+(passed?'Toolbox complete':'Not passed yet')+'</h2>'+
      '<p class="rsub reveal" data-d="2">You answered <b>'+correct+' of '+QUIZ.length+'</b> correctly. '+
        (passed?'You\u2019ve met the '+PASS_MARK+'% pass mark.':'You need '+PASS_MARK+'% to complete. Review the answers below and try again.')+'</p>'+
      '<div class="btn-row reveal" data-d="3">'+
        (passed?'<button class="btn btn-primary" id="toCert">View completion record \u2192</button>'
               :'<button class="btn btn-primary" id="retry">Retry the quiz</button>')+
        '<button class="btn btn-ghost" id="toggleRev">Review answers</button>'+
      '</div>'+
      '<div class="review" id="revBox" style="display:none">'+review+'</div>'+
    '</div>';
  stage.innerHTML=''; stage.appendChild(div); void div.offsetWidth; div.classList.add('active');
  nav.style.display='none'; window.scrollTo({top:0});
  setTimeout(function(){var r=document.getElementById('ring'); if(r) r.style.strokeDashoffset=off;},60);

  var rev=document.getElementById('toggleRev');
  rev.onclick=function(){var b=document.getElementById('revBox'); b.style.display=b.style.display==='none'?'flex':'none';};
  var rt=document.getElementById('retry'); if(rt) rt.onclick=startQuiz;
  var tc=document.getElementById('toCert'); if(tc) tc.onclick=function(){renderCert(pct,correct);};
}

function renderCert(pct,correct){
  crumb.textContent='Completed';
  var now=new Date();
  var dstr=now.toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'});
  var tstr=now.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});

  var div=document.createElement('div');
  div.className='screen';
  div.innerHTML=''+
    '<div class="result" style="padding-top:30px">'+
      '<div class="cert reveal">'+
        '<img class="clogo" src="'+LOGO+'" alt="Fallon Solutions">'+
        '<div class="ctitle">Certificate of Completion</div>'+
        '<div class="cmod">Apprentice Supervision &amp; Obligations</div>'+
        '<div class="crow">'+
          ci('Score', pct+'% ('+correct+'/'+QUIZ.length+')')+
          ci('Completed', dstr+' · '+tstr)+
        '</div>'+
        '<div class="stamp">Passed</div>'+
      '</div>'+
      '<div class="btn-row reveal" data-d="2">'+
        '<button class="btn btn-primary" id="printBtn">Save / print record</button>'+
        '<button class="btn btn-ghost" id="restart">Start over</button>'+
      '</div>'+
      '<p class="hint reveal" data-d="3">Your name, role and other details are recorded on the form below — this screen confirms your quiz result.</p>'+
    '</div>';
  stage.innerHTML=''; stage.appendChild(div); void div.offsetWidth; div.classList.add('active');
  nav.style.display='none'; window.scrollTo({top:0});
  pbar.style.width='100%';

  document.getElementById('printBtn').onclick=function(){window.print();};
  document.getElementById('restart').onclick=function(){state.i=0;state.answers=[];state.quizMode=false;renderScreen();};

  /* Optional: notify a parent JotForm/page of completion (used if embedded via iframe) */
  try{
    if(window.parent && window.parent!==window){
      window.parent.postMessage({type:'fallon-toolbox-complete',module:'apprentice-supervision',
        score:pct,correct:correct,total:QUIZ.length,completedAt:now.toISOString()},'*');
    }
  }catch(e){}
}
function ci(k,v){return '<div class="ci"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';}

/* boot */
var _bl=document.getElementById("brandLogo"); if(_bl) _bl.src=LOGO;
renderScreen();
</script>
</body>
</html>
